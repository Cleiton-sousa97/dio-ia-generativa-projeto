<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>FAQ Financeiro IA</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="chat-container">
    <!-- Cabeçalho -->
    <header class="chat-header">
      <h1>FAQ Financeiro IA</h1>
      <img src="https://cdn-icons-png.flaticon.com/512/4712/4712109.png" alt="Agente IA" class="icone-robo">
    </header>

    <!-- Área de mensagens -->
    <main id="chat"></main>

    <!-- Área de input -->
    <div class="input-area">
      <input id="pergunta" type="text" placeholder="Digite sua pergunta financeira...">
      <button onclick="fazerPergunta()">Enviar</button>
    </div>
  </div>

  <!-- Rodapé -->
  <footer class="chat-footer">
    <p>© 2026 FAQ Financeiro IA - Desenvolvido por Cleiton</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
